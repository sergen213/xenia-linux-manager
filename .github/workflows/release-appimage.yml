# Repeatable AppImage build and release-artifact assembly workflow
# for Xenia Manager for Linux distribution (Electron + xlm-core sidecar).
#
# Trigger: Push a tag matching v*.*.* (e.g. v0.1.0, v1.0.0)
#
# This workflow:
# 1. Checks out the tagged commit
# 2. Sets up Node.js and Rust toolchains
# 3. Builds the xlm-core sidecar, the renderer/main/preload bundles, and the
#    AppImage via electron-builder (`npm run dist`)
# 4. Uploads the AppImage and electron-updater feed (latest-linux.yml)
#
# Note: `--publish never` is passed because the in-app updater is inert until a
# real publish target (build.publish.owner) is configured. electron-builder
# emits latest-linux.yml itself — there is no separate manifest script.

name: Release AppImage

on:
  push:
    tags:
      - "v*.*.*"

  # Allow manual trigger for testing the workflow
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build but do not publish release)"
        required: false
        default: "false"
        type: boolean

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "22"
  RUST_TOOLCHAIN: "stable"

permissions:
  contents: write

jobs:
  build-appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Run renderer tests
        run: npm run test -- --run

      - name: Run Electron host tests
        run: npm run test:electron

      - name: Run Rust sidecar tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build AppImage
        run: npm run dist -- --publish never

      - name: List build artifacts
        run: |
          echo "=== release/ ==="
          ls -la release/ || echo "No release dir"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: appimage-release-${{ github.ref_name || 'dev' }}
          path: |
            release/*.AppImage
            release/latest-linux.yml
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: "Xenia Manager for Linux ${{ github.ref_name }}"
          body: |
            ## Xenia Manager for Linux ${{ github.ref_name }}

            ### Installation

            1. Download the `.AppImage` file below
            2. Make it executable: `chmod +x *.AppImage`
            3. Run it: `./*.AppImage`

            ### In-app Updates

            If you already have the app installed and in-app updates are enabled,
            the app will notify you about this update automatically.
          files: |
            release/*.AppImage
            release/latest-linux.yml
          draft: false
          prerelease: false
          generate_release_notes: true
